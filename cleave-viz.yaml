visualizer:
  name: cleave-viz-example
  width: 1280
  height: 720
  upscale: 1.5
  warmup_sec: 3.0   # pre-roll seconds to advance projectM past its white init state before the show starts
  beat_sensitivity: 2.0   # overall beat sensitivity, can be overidden on a per layer basis

render:
  width: 1280
  height: 720
  fps: 60
  post_fx:
    enabled: false
    fade_in: 30     # counted from start, 0 = disabled
    fade_out: 4     # counted from end, 0 = disable

  overlay:
    enabled: true
    start_delay: 5
    display_time: 30
    position: bottom-left
    title: 
      content: |
        Cleave Final Render
      font-size: 24
      font-colour: "#ffffff"
      background-colour: "#3333ff"
      margin-bottom: 10
    body: 
      content: |
        Place anything you like here
        Like musician names, year of release etc.
        Edit the cleave-viz.yaml to modify this message, colours etc.
      font-size: 18
      colour: "#ffffff"
      background-colour: 
    background:
      margin: 40
      padding: 20
      colour: "#000000"
      opacity: 0.6
      border:
        colour: "#ffffff"
        width: 4

paths:
  preset_root: ~/milkdrop-presets
  texture_paths:
    - ~/milkdrop-presets/presets-milkdrop-texture-pack

layer_z_order:
  - layer_1
  - layer_2
  - layer_3
  - layer_4
  
layers:
  layer_1:
    stem: drums
    preset: presets-cream-of-the-crop/Dancer/Aurora/
    enabled: true
    opacity: 1.0
    width: 1280
    height: 720
    blend_mode: add

  layer_2:
    stem: bass
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    width: 1280
    height: 720
    blend_mode: black-key

  layer_3:
    stem: vocals
    preset: presets-cream-of-the-crop/Sparkle/Explosions/
    enabled: true
    opacity: 1.0
    width: 1280
    height: 720
    blend_mode: black-key

  layer_4:
    stem: other
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    width: 1280
    height: 720
    blend_mode: black-key

timeline:
  enabled: false
