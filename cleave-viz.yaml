visualizer:
  name: cleave-viz-example
  width: 1280
  height: 720
  upscale: 1.5
  beat_sensitivity: 2.0   # global beat sensitivity, can be overriden per layer

render:
  width: 1280
  height: 720
  fps: 60
  hdr_compositing: true   # normally want to keep this enabled (helps prevent washout in compositing)
  post_fx:
    enabled: false
    fade_in: 15
    fade_out: 4
    highlight_rolloff:
      mode: off
      curve: rolloff
      threshold_pct: 78
      ceiling_pct: 65
      strength_pct: 70
      softness_pct: 40
      desaturation_pct: 30
    chroma_boost:
      mode: off
      variant: vibrance
      amount_pct: 25

  overlay:
    enabled: true
    start_delay: 5
    display_time: 30
    position: bottom-left
    title:
      content: |
        Your Track Title
      font-size: 28
      font-colour: "#f0f4ff"
      background-colour: "#5b6fd6"
      margin-bottom: 12
    body:
      content: |
        Artist Name  ·  Album  ·  2026
      font-size: 16
      colour: "#b8c4e0"
    background:
      margin: 36
      padding: 24
      colour: "#0c1020"
      opacity: 0.85
      border:
        colour: "#5b6fd6"
        width: 2

layer_z_order:
  - layer_1
  - layer_2
  - layer_3
  - layer_4

layers:
  layer_1:
    stem: drums
    preset: presets-cream-of-the-crop/Dancer/Aurora/
    enabled: true
    opacity: 0.5
    blend_mode: black-key
    beat_sensitivity: 2.0
    preset_switching: projectm
    preset_duration: 23
    soft_cut_duration: 2.0
    hard_cut_sensitivity: 0.7
    effects:
      pulse:
        onset: 0
      flash:
        onset: 0

  layer_2:
    stem: bass
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 0.6
    blend_mode: black-key
    beat_sensitivity: 2.0
    preset_switching: projectm
    preset_duration: 31
    soft_cut_duration: 5.0
    hard_cut_enabled: false
    effects:
      pulse:
        sub_bass: 0
      grit:
        sub_bass: 0

  layer_3:
    stem: vocals
    preset: presets-cream-of-the-crop/Sparkle/Explosions/
    enabled: true
    opacity: 0.7
    blend_mode: black-key
    beat_sensitivity: 2.0
    preset_switching: projectm
    preset_duration: 37
    soft_cut_duration: 3.0
    hard_cut_sensitivity: 0.7
    effects:
      hue:
        pitch: 0
      pulse:
        rms: 0
      flash:
        rms: 0

  layer_4:
    stem: other
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    blend_mode: black-key
    beat_sensitivity: 2.0
    preset_switching: projectm
    preset_duration: 43
    soft_cut_duration: 3.0
    hard_cut_enabled: false
    effects:
      pulse:
        centroid: 0
      grit:
        centroid: 0

timeline:
  enabled: false
