visualizer:
  name: cleave-explorer
  width: 1280
  height: 720
  fps: 30
  beat_sensitivity: 1.0

render:
  overlay:
    enabled: true
    title: Cleave Final Render
    body: |
      Place anything you like here
      Like musician names, year of release etc.
      As many lines as you like
    start: 10
    display_time: 30
    position: bottom-left
    font:
      size: 10
      colour: "#ffaa00"
    background:
      margin: 10
      padding: 10
      colour: "#223344"
      opacity: 1.0
      border:
        colour: "#223344"
        width: 2

paths:
  preset_root: ~/milkdrop-presets
  texture_paths:
    - ~/milkdrop-presets/presets-milkdrop-texture-pack

layer_z_order:
  - drums
  - vocals
  - bass
  - other
  
layers:
  drums:
    preset: presets-cream-of-the-crop/Dancer/Aurora/
    enabled: true
    opacity: 1.0
    width: 1280
    height: 720
    blend_mode: black-key

  bass:
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    width: 960
    height: 540
    blend_mode: black-key

  vocals:
    preset: presets-cream-of-the-crop/Sparkle/Explosions/
    enabled: true
    opacity: 1.0
    width: 960
    height: 540
    blend_mode: black-key

  other:
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    width: 640
    height: 360
    blend_mode: black-key
