visualizer:
  name: cleave-viz-default
  width: 1280
  height: 720
  fps: 30
  beat_sensitivity: 1.0

render:
  overlay:
    enabled: true
    title: Cleave Final Render
    body: |
      Place anything you like here
      Like musician names, year of release etc.
      Edit the cleave-viz.yaml to modify this message, colours etc.
    start: 10
    display_time: 30
    position: bottom-left
    font:
      size: 18
      colour: "#ffffff"
    background:
      margin: 40
      padding: 20
      colour: "#000000"
      opacity: 0.7
      border:
        colour: "#ffffff"
        width: 4

paths:
  preset_root: ~/milkdrop-presets
  texture_paths:
    - ~/milkdrop-presets/presets-milkdrop-texture-pack

layer_z_order:
  - drums
  - vocals
  - bass
  - other
  
layers:
  drums:
    preset: presets-cream-of-the-crop/Dancer/Aurora/
    enabled: true
    opacity: 1.0
    width: 1280
    height: 720
    blend_mode: black-key

  bass:
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    width: 960
    height: 540
    blend_mode: black-key

  vocals:
    preset: presets-cream-of-the-crop/Sparkle/Explosions/
    enabled: true
    opacity: 1.0
    width: 960
    height: 540
    blend_mode: black-key

  other:
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    width: 640
    height: 360
    blend_mode: black-key
