# Golden set for preset scan classifier tuning.
# Manual labels from live review (clean manual preset boot) in
# projects/sights-and-sounds-26/unnamed-1.yaml .. unnamed-25.yaml.
#
# expected_result:
#   ok        - pass; do not quarantine
#   dim       - quarantine; preset runs but output is too dim
#   black     - quarantine; preset does not develop (black / broken)
#   washed_out - quarantine; extreme white blowout (future classifier case)
#
# Harness should resolve preset paths against preset_root and apply texture_paths.

version: 1
preset_root: ~/milkdrop-presets
texture_paths:
  - ~/milkdrop-presets/presets-milkdrop-texture-pack
source_project: projects/sights-and-sounds-26
source_configs: unnamed-1.yaml through unnamed-30.yaml
review_notes: >
  Labels from layer_1 preset comments while browsing with clean manual preset
  boot (load_manual_preset_clean). Most configs use beat_sensitivity 2.0 on
  layer_1; unnamed-8 through unnamed-10 use ~0.9.

cases:
  - id: 1
    source_config: unnamed-1.yaml
    preset: presets-milkdrop-original/Milkdrop-Original/BrainStain-Blackwidow.milk
    expected_result: dim
    notes: Working, but too dim.

  - id: 2
    source_config: unnamed-2.yaml
    preset: presets-milkdrop-original/Milkdrop-Original/Aderrasi - Airhandler (Principle of Sharing).milk
    expected_result: black
    notes: Not working.

