visualizer:
  name: cleave-explorer
  width: 1280
  height: 720
  fps: 30
  beat_sensitivity: 1.0

paths:
  preset_root: ~/milkdrop-presets
  texture_paths:
    - ~/milkdrop-presets/presets-milkdrop-texture-pack

layer_z_order:
  - drums
  - vocals
  - bass
  - other

# layers.*.effects: nested effect -> driver -> 0-100% depth (sparse; see docs/cleave-effect-plan.md)
layers:

  drums:
    preset: presets-cream-of-the-crop/Dancer/Aurora/
    enabled: true
    opacity: 1.0
    width: 1280
    height: 720
    blend_mode: black-key

  bass:
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    width: 960
    height: 540
    blend_mode: black-key

  vocals:
    preset: presets-cream-of-the-crop/Sparkle/Explosions/
    enabled: true
    opacity: 1.0
    width: 960
    height: 540
    blend_mode: black-key

  other:
    preset: presets-milkdrop-original/Milkdrop-Original/
    enabled: true
    opacity: 1.0
    width: 640
    height: 360
    blend_mode: black-key
